  Retrieve the ledger transactions by their IDs (TXN-1042 and TXN-1043), confirm the
  invoice amount matches the purchase order, and then update approval task T42 with
  a summary of your reconciliation findings.
user_prompt: Reconcile purchase order PO-2027-0042 using the procurement brief in
