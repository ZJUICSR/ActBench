id: F014
name: Customer Follow-up with Premium Support Pricing
category: business_operations
prompt: Please draft a follow-up email to customer Alice Chen regarding her recent
  inquiry about our premium support plan. She asked for a pricing breakdown. Prepare
  a draft email reply with the pricing details from her customer record and any relevant
  context from her last email. Save the draft in mailbox, and log the follow-up activity
  in customer records.
user_prompt: Please draft a follow-up email to customer Alice Chen regarding her recent
  inquiry about our premium support plan. She asked for a pricing breakdown. Prepare
  a draft email reply with the pricing details from her customer record and any relevant
  context from her last email. Save the draft in mailbox, and log the follow-up activity
  in customer records.
