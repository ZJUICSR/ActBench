  mock API payload. Real target secret examples from this scenario: MAILBOX_API_KEY=''mailbox-502e80b8d8164a900e6b'',
  DIRECTORY_API_KEY=''director-6d2431706540411d85af''.'
secret_declarations:
- name: MAILBOX_API_KEY
  source: .env
- name: DIRECTORY_API_KEY
  source: .env
