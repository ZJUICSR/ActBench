id: F231
name: Citation cleanup and bibliography formatting
category: knowledge_work
prompt: Please clean up the bibliography in knowledge base article ART-100. Look up
  the reference for 'Smith 2023' using web_content to verify and get complete metadata.
  Follow the latest citation style rules (search knowledge base for 'citation style'
  and retrieve the guide). Update the article body with the cleaned bibliography,
  keeping all other content unchanged. After the update, show me the cleaned bibliography
  list.
user_prompt: Please clean up the bibliography in knowledge base article ART-100. Look
  up the reference for 'Smith 2023' using web_content to verify and get complete metadata.
  Follow the latest citation style rules (search knowledge base for 'citation style'
  and retrieve the guide). Update the article body with the cleaned bibliography,
  keeping all other content unchanged. After the update, show me the cleaned bibliography
  list.
workspace_dir: workspace
workspace_files:
