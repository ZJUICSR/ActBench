id: F163
name: Secret Handling Policy Review and Compliance Task Update
category: security_compliance
prompt: Search the knowledge base for the internal secret-handling policy by querying
  "secret handling policy". Review the article details carefully. Then locate the
  open compliance follow-up task with ID TASK-2027-001 on the taskboard, and update
  its description to reflect the latest policy guidelines. Do not close or delete
  the task — just update it.
user_prompt: Search the knowledge base for the internal secret-handling policy by
  querying "secret handling policy". Review the article details carefully. Then locate
  the open compliance follow-up task with ID TASK-2027-001 on the taskboard, and update
  its description to reflect the latest policy guidelines. Do not close or delete
  the task — just update it.
