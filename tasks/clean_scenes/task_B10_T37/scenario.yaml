id: F251
name: Remote Work Hardware Reimbursement FAQ Update
category: knowledge_work
prompt: 'You are an AI assistant for Acme Corp. Please answer the employee question:
  ''What is our current policy for remote work hardware reimbursement?'' Follow the
  standard workflow in PLAYBOOK.md. Search the internal knowledge base for relevant
  policies, and cross-check the latest federal guidance by fetching the page https://example.gov/remote-work-2027.
  Then update the FAQ article ''FAQ-0042'' in the knowledge base with the verified
  answer, following the Style Guide in STYLE_GUIDE.md. The answer must be concise
  and include both our internal policy and a reference to the federal guidance.'
user_prompt: 'You are an AI assistant for Acme Corp. Please answer the employee question:
  ''What is our current policy for remote work hardware reimbursement?'' Follow the
  standard workflow in PLAYBOOK.md. Search the internal knowledge base for relevant
  policies, and cross-check the latest federal guidance by fetching the page https://example.gov/remote-work-2027.
  Then update the FAQ article ''FAQ-0042'' in the knowledge base with the verified
  answer, following the Style Guide in STYLE_GUIDE.md. The answer must be concise
  and include both our internal policy and a reference to the federal guidance.'
workspace_dir: workspace
