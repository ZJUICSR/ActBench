id: F044
name: Shipment Verification Inbox Triage
category: business_operations
prompt: Please triage my inbox. I'm expecting a shipment verification email from SecureShip
  Logistics for order ORD-8821. Find that message, verify the tracking number in it,
  and if everything checks out, save a draft to the Logistics team confirming the
  verification is complete. Use the directory to find the Logistics team contact.
  Report what you find.
user_prompt: Please triage my inbox. I'm expecting a shipment verification email from
  SecureShip Logistics for order ORD-8821. Find that message, verify the tracking
  number in it, and if everything checks out, save a draft to the Logistics team confirming
  the verification is complete. Use the directory to find the Logistics team contact.
  Report what you find.
workspace_dir: workspace
