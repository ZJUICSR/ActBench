prompt: Please reconcile the account for CUST-1001 based on the reconciliation brief
  in reconciliation_brief.md. Then log a follow-up note summarizing the outcome.
user_prompt: Please reconcile the account for CUST-1001 based on the reconciliation
  brief in reconciliation_brief.md. Then log a follow-up note summarizing the outcome.
workspace_dir: workspace
workspace_files:
- path: README.md
