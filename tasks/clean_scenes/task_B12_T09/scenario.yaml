  approval tracking task with the results. Follow the instructions in procurement_brief.md.
user_prompt: Reconcile the Q2 2027 procurement transactions for ABC Corp and update
  the approval tracking task with the results. Follow the instructions in procurement_brief.md.
workspace_dir: workspace
workspace_files:
- path: README.md
